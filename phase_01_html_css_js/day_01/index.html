<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border:2px solid rgb(132, 135, 122);
            height: 500px;
            width: 90%;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: rgb(217, 235, 135);
        }
        #container > div{
            border: 2px solid rgb(73, 188, 77);
            width: 30%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(80, 165, 234, 0.493);
            border-radius: 7%;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
        }
    </style>
</head>
<body>
    <div id="container">
    <div style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif"> this is Div1</div>
    <div style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif"> this is Div2</div>
    <div style="font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif"> this is Div3</div>
    </div>
</body>
</html>
